<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>N-Queens DFS Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0c10;
    --panel: #0f1318;
    --border: #1e2a38;
    --accent: #00ffe7;
    --accent2: #ff4c6a;
    --accent3: #f5c518;
    --text: #c8d8e8;
    --dim: #4a6070;
    --queen-light: #fff8e1;
    --queen-dark: #1a2535;
    --cell-light: #1e2d40;
    --cell-dark: #111820;
    --cell-active: #00ffe722;
    --cell-conflict: #ff4c6a22;
    --cell-queen: #f5c51833;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Share Tech Mono’, monospace;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 24px 16px;
}

/* ── HEADER ── */
header {
text-align: center;
margin-bottom: 28px;
}
header h1 {
font-family: ‘Orbitron’, sans-serif;
font-size: clamp(1.4rem, 4vw, 2.4rem);
font-weight: 900;
letter-spacing: 0.12em;
color: var(–accent);
text-shadow: 0 0 24px var(–accent), 0 0 60px #00ffe744;
}
header p {
color: var(–dim);
font-size: 0.78rem;
letter-spacing: 0.1em;
margin-top: 6px;
}

/* ── INPUT SECTION ── */
.input-row {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 28px;
flex-wrap: wrap;
justify-content: center;
}
.input-row label {
font-size: 0.85rem;
color: var(–dim);
letter-spacing: 0.1em;
}
.input-row input[type=number] {
width: 72px;
background: var(–panel);
border: 1px solid var(–border);
color: var(–accent);
font-family: ‘Orbitron’, sans-serif;
font-size: 1.1rem;
text-align: center;
padding: 8px 10px;
outline: none;
border-radius: 4px;
transition: border-color 0.2s;
}
.input-row input[type=number]:focus { border-color: var(–accent); }
.btn {
font-family: ‘Orbitron’, sans-serif;
font-size: 0.75rem;
font-weight: 700;
letter-spacing: 0.12em;
padding: 10px 22px;
border: none;
border-radius: 4px;
cursor: pointer;
transition: all 0.18s;
}
.btn-solve {
background: var(–accent);
color: #000;
box-shadow: 0 0 14px #00ffe755;
}
.btn-solve:hover { box-shadow: 0 0 28px #00ffe799; transform: translateY(-1px); }
.btn-solve:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-reset {
background: transparent;
border: 1px solid var(–accent2);
color: var(–accent2);
}
.btn-reset:hover { background: var(–accent2); color: #000; }

.speed-row {
display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
font-size: 0.78rem; color: var(–dim);
}
.speed-row input[type=range] {
accent-color: var(–accent);
width: 120px;
}
#speed-label { color: var(–accent); min-width: 50px; }

/* ── MAIN LAYOUT ── */
.main {
display: flex;
gap: 24px;
width: 100%;
max-width: 1100px;
align-items: flex-start;
flex-wrap: wrap;
justify-content: center;
}

/* ── BOARD ── */
.board-wrap {
flex: 0 0 auto;
display: flex;
flex-direction: column;
align-items: center;
gap: 14px;
}
#board {
display: grid;
border: 2px solid var(–border);
box-shadow: 0 0 40px #00ffe710;
}
.cell {
width: 52px; height: 52px;
display: flex; align-items: center; justify-content: center;
font-size: 1.5rem;
transition: background 0.15s, box-shadow 0.15s;
position: relative;
}
.cell.light { background: var(–cell-light); }
.cell.dark  { background: var(–cell-dark); }
.cell.active { background: var(–cell-active); box-shadow: inset 0 0 12px #00ffe730; }
.cell.conflict { background: var(–cell-conflict); box-shadow: inset 0 0 14px #ff4c6a40; }
.cell.placed { background: var(–cell-queen); }

/* Queen */
.queen-icon {
font-size: 1.6rem;
animation: popIn 0.25s cubic-bezier(.3,1.5,.6,1);
filter: drop-shadow(0 0 8px var(–accent3));
}
@keyframes popIn {
from { transform: scale(0) rotate(-30deg); opacity: 0; }
to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}

/* Stats strip */
.stats {
display: flex; gap: 20px; font-size: 0.75rem;
color: var(–dim); letter-spacing: 0.08em;
}
.stats span { color: var(–accent3); font-family: ‘Orbitron’, sans-serif; font-weight: 700; }

/* Status badge */
#status-badge {
font-family: ‘Orbitron’, sans-serif;
font-size: 0.7rem;
letter-spacing: 0.14em;
padding: 5px 14px;
border-radius: 20px;
border: 1px solid var(–border);
color: var(–dim);
background: var(–panel);
transition: all 0.2s;
}
#status-badge.running  { border-color: var(–accent);  color: var(–accent);  background: #00ffe710; }
#status-badge.solved   { border-color: var(–accent3); color: var(–accent3); background: #f5c51815; }
#status-badge.failed   { border-color: var(–accent2); color: var(–accent2); background: #ff4c6a10; }

/* ── LOG PANEL ── */
.log-panel {
flex: 1 1 320px;
min-width: 280px;
max-width: 440px;
display: flex;
flex-direction: column;
gap: 10px;
}
.log-title {
font-family: ‘Orbitron’, sans-serif;
font-size: 0.68rem;
letter-spacing: 0.18em;
color: var(–accent);
border-bottom: 1px solid var(–border);
padding-bottom: 8px;
}
#log-box {
background: var(–panel);
border: 1px solid var(–border);
border-radius: 4px;
height: 420px;
overflow-y: auto;
padding: 12px;
font-size: 0.73rem;
line-height: 1.7;
scroll-behavior: smooth;
}
#log-box::-webkit-scrollbar { width: 4px; }
#log-box::-webkit-scrollbar-track { background: var(–panel); }
#log-box::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

.log-line { display: block; }
.log-line.try   { color: #6ea8d4; }
.log-line.ok    { color: var(–accent3); }
.log-line.back  { color: var(–accent2); }
.log-line.done  { color: var(–accent);  font-weight: 700; }
.log-line.info  { color: var(–dim); }
.log-line .ts   { color: #2a3a4a; margin-right: 6px; }
.log-line .row  { color: #aaa; }

/* Legend */
.legend {
display: flex; gap: 14px; flex-wrap: wrap; font-size: 0.68rem; color: var(–dim);
}
.legend-dot {
display: inline-block;
width: 8px; height: 8px;
border-radius: 50%;
margin-right: 5px;
}

/* Solution display */
.solution-list {
font-size: 0.75rem; color: var(–dim); margin-top: 4px;
}
.solution-list span { color: var(–accent3); }

/* Responsive cells */
@media (max-width: 600px) {
.cell { width: 38px; height: 38px; font-size: 1.1rem; }
.queen-icon { font-size: 1.1rem; }
#log-box { height: 280px; }
}
</style>

</head>
<body>

<header>
  <h1>N-QUEENS · DFS VISUALIZER</h1>
  <p>DEPTH-FIRST SEARCH · BACKTRACKING ALGORITHM</p>
</header>

<!-- INPUT -->

<div class="input-row">
  <label for="n-input">N =</label>
  <input type="number" id="n-input" value="6" min="1" max="12" />
  <button class="btn btn-solve" id="btn-solve" onclick="startSolve()">▶ SOLVE</button>
  <button class="btn btn-reset" id="btn-reset" onclick="resetAll()">↺ RESET</button>
</div>
<div class="speed-row">
  <label>SPEED</label>
  <input type="range" id="speed-slider" min="1" max="5" value="3" oninput="updateSpeed(this.value)"/>
  <span id="speed-label">MEDIUM</span>
</div>

<!-- MAIN -->

<div class="main">

  <!-- BOARD -->

  <div class="board-wrap">
    <div id="board"></div>
    <div class="stats">
      <div>CALLS <span id="stat-calls">0</span></div>
      <div>PLACED <span id="stat-placed">0</span></div>
      <div>BACKTRACKS <span id="stat-bt">0</span></div>
    </div>
    <div id="status-badge">IDLE</div>
    <div class="solution-list" id="solution-display"></div>
  </div>

  <!-- LOG -->

  <div class="log-panel">
    <div class="log-title">⬡ ALGORITHM LOG</div>
    <div id="log-box"></div>
    <div class="legend">
      <div><span class="legend-dot" style="background:#6ea8d4"></span>TRYING</div>
      <div><span class="legend-dot" style="background:#f5c518"></span>PLACED</div>
      <div><span class="legend-dot" style="background:#ff4c6a"></span>BACKTRACK</div>
      <div><span class="legend-dot" style="background:#00ffe7"></span>SOLVED</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let N = 6;
let queens = [];        // queens[row] = col  (-1 = none)
let cells = [];         // DOM cells[row][col]
let steps = [];         // recorded animation steps
let stepIdx = 0;
let animTimer = null;
let solving = false;

let statCalls = 0;
let statBt    = 0;

// ms delay per step based on slider
const SPEEDS = [600, 350, 180, 70, 15];
let delay = SPEEDS[2];

function updateSpeed(v) {
  delay = SPEEDS[v - 1];
  const labels = ['SLOW','MEDIUM-SLOW','MEDIUM','FAST','ULTRA'];
  document.getElementById('speed-label').textContent = labels[v-1];
}

// ══════════════════════════════════════════════
//  BUILD BOARD
// ══════════════════════════════════════════════
function buildBoard() {
  N = parseInt(document.getElementById('n-input').value) || 6;
  N = Math.max(1, Math.min(12, N));
  document.getElementById('n-input').value = N;

  queens = Array(N).fill(-1);
  cells  = [];

  const board = document.getElementById('board');
  board.innerHTML = '';
  board.style.gridTemplateColumns = `repeat(${N}, 1fr)`;

  // Responsive cell size
  const vw = Math.min(window.innerWidth, 500);
  const cellSize = Math.max(30, Math.min(52, Math.floor((vw - 48) / N)));
  board.style.width  = (cellSize * N) + 'px';
  board.style.height = (cellSize * N) + 'px';

  for (let r = 0; r < N; r++) {
    cells[r] = [];
    for (let c = 0; c < N; c++) {
      const div = document.createElement('div');
      div.className = 'cell ' + ((r + c) % 2 === 0 ? 'light' : 'dark');
      div.style.width  = cellSize + 'px';
      div.style.height = cellSize + 'px';
      div.style.fontSize = Math.max(14, cellSize - 14) + 'px';
      board.appendChild(div);
      cells[r][c] = div;
    }
  }
  updateStats(0, 0);
  setStatus('IDLE', '');
  clearLog();
  document.getElementById('solution-display').textContent = '';
}

// ══════════════════════════════════════════════
//  SIMPLE DFS / BACKTRACKING  (records steps)
// ══════════════════════════════════════════════
function isSafe(row, col, placed) {
  for (let r = 0; r < row; r++) {
    const c = placed[r];
    if (c === col) return false;           // same column
    if (Math.abs(r - row) === Math.abs(c - col)) return false; // diagonal
  }
  return true;
}

function solve(row, placed) {
  statCalls++;
  if (row === N) {
    // SOLUTION FOUND
    steps.push({ type: 'done', placed: [...placed] });
    return true;
  }

  for (let col = 0; col < N; col++) {
    steps.push({ type: 'try', row, col, placed: [...placed] });

    if (isSafe(row, col, placed)) {
      placed[row] = col;
      steps.push({ type: 'place', row, col, placed: [...placed] });

      if (solve(row + 1, placed)) return true;

      // backtrack
      placed[row] = -1;
      statBt++;
      steps.push({ type: 'back', row, col, placed: [...placed] });
    }
  }
  return false;
}

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
function startSolve() {
  if (solving) return;
  resetAll();
  buildBoard();

  statCalls = 0;
  statBt    = 0;
  steps     = [];
  stepIdx   = 0;

  logLine('info', `► Solving ${N}-Queens with DFS backtracking…`);
  logLine('info', `  Try each column in row 0→${N-1}; backtrack if conflict.`);

  const placed = Array(N).fill(-1);
  const found  = solve(0, placed);

  if (!found) steps.push({ type: 'fail' });

  solving = true;
  document.getElementById('btn-solve').disabled = true;
  setStatus('RUNNING', 'running');
  animate();
}

// ══════════════════════════════════════════════
//  ANIMATION LOOP
// ══════════════════════════════════════════════
function animate() {
  if (stepIdx >= steps.length) { solving = false; return; }
  const s = steps[stepIdx++];
  applyStep(s);
  animTimer = setTimeout(animate, delay);
}

function applyStep(s) {
  // clear board highlights first
  clearHighlights();

  if (s.type === 'try') {
    cells[s.row][s.col].classList.add('active');
    logLine('try', `  Row ${s.row}: trying col ${s.col}…`, s.row, s.col);

  } else if (s.type === 'place') {
    cells[s.row][s.col].classList.add('placed');
    cells[s.row][s.col].innerHTML = '<span class="queen-icon">♛</span>';
    queens[s.row] = s.col;
    logLine('ok', `✔ Row ${s.row}: placed at col ${s.col}`, s.row, s.col);
    updateStats(s.placed.filter(x => x !== -1).length, statBt);

  } else if (s.type === 'back') {
    cells[s.row][s.col].classList.remove('placed');
    cells[s.row][s.col].innerHTML = '';
    cells[s.row][s.col].classList.add('conflict');
    queens[s.row] = -1;
    logLine('back', `✘ Backtrack from row ${s.row}, col ${s.col}`, s.row, s.col);
    statBt++;
    updateStats(s.placed.filter(x => x !== -1).length, statBt);

  } else if (s.type === 'done') {
    // final render
    for (let r = 0; r < N; r++) {
      cells[r][s.placed[r]].innerHTML = '<span class="queen-icon">♛</span>';
      cells[r][s.placed[r]].classList.add('placed');
    }
    const sol = s.placed.map((c, r) => `(${r},${c})`).join(' → ');
    logLine('done', `★ SOLUTION FOUND! [${s.placed.join(', ')}]`);
    setStatus('SOLVED ✓', 'solved');
    document.getElementById('solution-display').innerHTML =
      `<span>Solution: [${s.placed.join(', ')}]</span><br>` +
      `<span style="color:#4a6070">Calls: ${statCalls} · Backtracks: ${statBt}</span>`;
    updateStats(N, statBt);
    document.getElementById('btn-solve').disabled = false;

  } else if (s.type === 'fail') {
    logLine('back', `✘ No solution exists for N=${N}.`);
    setStatus('NO SOLUTION', 'failed');
    document.getElementById('btn-solve').disabled = false;
  }

  document.getElementById('stat-calls').textContent = statCalls;
}

function clearHighlights() {
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      cells[r][c].classList.remove('active', 'conflict');
    }
}

// ══════════════════════════════════════════════
//  LOG
// ══════════════════════════════════════════════
let logCount = 0;
function logLine(cls, msg) {
  const box = document.getElementById('log-box');
  const el  = document.createElement('span');
  el.className = `log-line ${cls}`;
  logCount++;
  el.innerHTML = `<span class="ts">${String(logCount).padStart(4,'0')}</span>${msg}`;
  box.appendChild(el);
  box.appendChild(document.createElement('br'));
  box.scrollTop = box.scrollHeight;
}
function clearLog() {
  document.getElementById('log-box').innerHTML = '';
  logCount = 0;
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function updateStats(placed, bt) {
  document.getElementById('stat-calls').textContent  = statCalls;
  document.getElementById('stat-placed').textContent = placed;
  document.getElementById('stat-bt').textContent     = bt;
}

function setStatus(txt, cls) {
  const b = document.getElementById('status-badge');
  b.textContent = txt;
  b.className   = cls;
}

function resetAll() {
  if (animTimer) clearTimeout(animTimer);
  animTimer = null;
  solving   = false;
  steps     = [];
  stepIdx   = 0;
  statCalls = 0;
  statBt    = 0;
  document.getElementById('btn-solve').disabled = false;
  buildBoard();
  clearLog();
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
buildBoard();
logLine('info', `Welcome! Set N and press SOLVE to begin.`);
logLine('info', `DFS will try each column, backtrack on conflict.`);
</script>

</body>
</html>
